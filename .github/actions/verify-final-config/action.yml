name: Verify final config
description: Verify requested config entries landed in final kernel config.
inputs:
  strict_config:
    required: true
    description: Fail when requested configs do not land.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        cd kernel

        REQUIRED="common/private.required"

        if [ ! -s "$REQUIRED" ]; then
          echo "No requested config entries to verify."
          exit 0
        fi

        echo "== requested configs =="
        cat "$REQUIRED"
        echo

        echo "== final config candidates =="
        {
          find ./out ./common/out \
            -type f \
            \( -name ".config" -o -name "*.config" -o -name "*kernel*.config" \) \
            ! -path "./common/arch/arm64/configs/*" \
            ! -path "./common/private.fragment" \
            ! -path "./common/private.required" \
            2>/dev/null || true
        } | sort
        echo

        CANDIDATES="$(mktemp)"

        {
          find ./out ./common/out \
            -type f \
            \( -name ".config" -o -name "*.config" -o -name "*kernel*.config" \) \
            ! -path "./common/arch/arm64/configs/*" \
            ! -path "./common/private.fragment" \
            ! -path "./common/private.required" \
            2>/dev/null || true
        } | sort > "$CANDIDATES"

        if [ ! -s "$CANDIDATES" ]; then
          echo "::warning::No final full config candidate found under out/ or common/out/."
          if [ "${{ inputs.strict_config }}" = "on" ]; then
            echo "::error::strict_config is on, failing because final config was not found."
            exit 1
          fi
          exit 0
        fi

        BEST=""
        BEST_SCORE="-1"

        while read -r cfg; do
          [ -f "$cfg" ] || continue
          grep -q '^CONFIG_' "$cfg" || continue

          SCORE=0

          while read -r line; do
            [ -z "$line" ] && continue
            key="${line%%=*}"

            if grep -qxF "$line" "$cfg"; then
              SCORE=$((SCORE + 2))
            elif grep -q "^${key}=" "$cfg" || grep -q "^# ${key} is not set" "$cfg"; then
              SCORE=$((SCORE + 1))
            fi
          done < "$REQUIRED"

          echo "candidate score: $SCORE :: $cfg"

          if [ "$SCORE" -gt "$BEST_SCORE" ]; then
            BEST_SCORE="$SCORE"
            BEST="$cfg"
          fi
        done < "$CANDIDATES"

        if [ -z "$BEST" ]; then
          echo "::warning::No usable final config candidate found."
          if [ "${{ inputs.strict_config }}" = "on" ]; then
            echo "::error::strict_config is on, failing."
            exit 1
          fi
          exit 0
        fi

        echo
        echo "Using final config: $BEST"
        echo

        FAIL=0

        while read -r line; do
          [ -z "$line" ] && continue

          key="${line%%=*}"

          if grep -qxF "$line" "$BEST"; then
            echo "OK: $line"
          else
            echo "::warning::$line did not land in final .config"
            grep -E "^${key}=|^# ${key} is not set" "$BEST" || true
            FAIL=1
          fi
        done < "$REQUIRED"

        echo
        echo "== final protected config state =="
        for key in \
          CONFIG_MODULES \
          CONFIG_MODULE_UNLOAD \
          CONFIG_MODVERSIONS \
          CONFIG_SHADOW_CALL_STACK \
          CONFIG_CFI_CLANG \
          CONFIG_LTO_CLANG \
          CONFIG_LTO_CLANG_FULL \
          CONFIG_LTO_CLANG_THIN \
          CONFIG_KASAN \
          CONFIG_KASAN_HW_TAGS \
          CONFIG_UBSAN \
          CONFIG_UBSAN_TRAP \
          CONFIG_ANDROID_VENDOR_HOOKS \
          CONFIG_ANDROID_KABI_RESERVE
        do
          grep -E "^${key}=|^# ${key} is not set" "$BEST" || true
        done

        if [ "$FAIL" -ne 0 ]; then
          echo
          echo "== nearby requested config state =="
          cut -d= -f1 "$REQUIRED" | while read -r key; do
            [ -z "$key" ] && continue
            grep -E "^${key}=|^# ${key} is not set" "$BEST" || true
          done

          if [ "${{ inputs.strict_config }}" = "on" ]; then
            echo "::error::strict_config is on, failing because requested config did not land."
            exit 1
          fi

          echo "::warning::Some requested configs did not land, but strict_config=off, so continuing."
        fi
