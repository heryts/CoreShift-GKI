name: Init manager
description: Initialize selected kernel manager.

inputs:
  manager:
    required: true
    description: Manager submodule name.
  manager_ref:
    required: false
    default: ""
    description: Optional manager git ref, commit, or tag.
  susfs:
    required: true
    description: Whether SUSFS4KSU patches are enabled.
  kernel_version:
    required: true
    description: Kernel version used for SUSFS manager compatibility selection.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        MANAGER="${{ inputs.manager }}"
        KERNEL_VERSION="${{ inputs.kernel_version }}"
        MANAGER_DIR="${GITHUB_WORKSPACE}/manager/${MANAGER}"
        COMMON_DIR="${GITHUB_WORKSPACE}/kernel/common"

        SELECTED_MANAGER_REF=""
        MANAGER_REF_SOURCE="submodule-default"

        echo "== init manager =="
        echo "manager=$MANAGER"
        echo "kernel_version=$KERNEL_VERSION"
        echo "manager_dir=$MANAGER_DIR"
        echo "common_dir=$COMMON_DIR"

        git submodule update --init --depth 1 --single-branch "manager/${MANAGER}"

        if [ -n "${{ inputs.manager_ref }}" ]; then
          SELECTED_MANAGER_REF="${{ inputs.manager_ref }}"
          MANAGER_REF_SOURCE="explicit"
        elif [ "${{ inputs.susfs }}" = "on" ]; then
          echo "== SUSFS manager compatibility table =="
          printf '%s\n' \
            'manager   kernel  ref' \
            'KernelSU  5.10    3c30f77db1802d68a1cfcfb77d49c92fe93873ac' \
            'KernelSU  6.1     3c30f77db1802d68a1cfcfb77d49c92fe93873ac' \
            'KernelSU  6.6     3c30f77db1802d68a1cfcfb77d49c92fe93873ac' \
            'KernelSU  6.12    3c30f77db1802d68a1cfcfb77d49c92fe93873ac' \
            'KowSU     5.10    cf087d755af8e322e6840d02b082a7b3871726c7' \
            'KowSU     6.1     cf087d755af8e322e6840d02b082a7b3871726c7' \
            'KowSU     6.6     cf087d755af8e322e6840d02b082a7b3871726c7' \
            'KowSU     6.12    cf087d755af8e322e6840d02b082a7b3871726c7'

          case "${MANAGER}:${KERNEL_VERSION}" in
            KernelSU:5.10|KernelSU:6.1|KernelSU:6.6|KernelSU:6.12)
              SELECTED_MANAGER_REF="3c30f77db1802d68a1cfcfb77d49c92fe93873ac"
              MANAGER_REF_SOURCE="susfs-default"
              ;;
            KowSU:5.10|KowSU:6.1|KowSU:6.6|KowSU:6.12)
              SELECTED_MANAGER_REF="cf087d755af8e322e6840d02b082a7b3871726c7"
              MANAGER_REF_SOURCE="susfs-default"
              ;;
            *)
              echo "::error::No SUSFS-compatible default manager ref for manager=${MANAGER}, kernel_version=${KERNEL_VERSION}. Set manager_ref explicitly."
              exit 1
              ;;
          esac
        fi

        cd "$MANAGER_DIR"

        if [ -n "$SELECTED_MANAGER_REF" ]; then
          echo "== pin manager ref =="
          echo "manager_ref=$SELECTED_MANAGER_REF"

          git fetch --depth=1 origin "$SELECTED_MANAGER_REF" ||
            git fetch origin "$SELECTED_MANAGER_REF"

          git checkout FETCH_HEAD
        fi

        MANAGER_HEAD="$(git rev-parse HEAD)"
        MANAGER_DESCRIBE="$(git describe --tags --always || git rev-parse --short HEAD)"

        echo "manager ref source: $MANAGER_REF_SOURCE"
        echo "selected manager ref: ${SELECTED_MANAGER_REF:-submodule-default}"
        echo "manager HEAD: $MANAGER_HEAD"
        echo "manager describe: $MANAGER_DESCRIBE"

        # Critical fix:
        # If no explicit/SUSFS ref was selected, pass the actual submodule HEAD
        # into KernelSU/KowSU setup.sh instead of letting setup.sh use its own default.
        if [ -z "$SELECTED_MANAGER_REF" ] && { [ "$MANAGER" = "KernelSU" ] || [ "$MANAGER" = "KowSU" ]; }; then
          SELECTED_MANAGER_REF="$MANAGER_HEAD"
          MANAGER_REF_SOURCE="submodule-head"
          echo "using submodule HEAD as setup ref: $SELECTED_MANAGER_REF"
        fi

        if [ -f "$MANAGER_DIR/kernel/setup.sh" ]; then
          SETUP_SCRIPT="$MANAGER_DIR/kernel/setup.sh"
        elif [ -f "$MANAGER_DIR/setup.sh" ]; then
          SETUP_SCRIPT="$MANAGER_DIR/setup.sh"
        else
          echo "::error::No setup.sh found for manager=${MANAGER}"
          exit 1
        fi

        echo "== run manager setup =="
        echo "setup_script=$SETUP_SCRIPT"
        echo "setup_ref=${SELECTED_MANAGER_REF:-none}"

        cd "$COMMON_DIR"

        if [ -n "$SELECTED_MANAGER_REF" ] && { [ "$MANAGER" = "KernelSU" ] || [ "$MANAGER" = "KowSU" ]; }; then
          bash "$SETUP_SCRIPT" "$SELECTED_MANAGER_REF"
        else
          bash "$SETUP_SCRIPT"
        fi

        echo "== verify integrated KernelSU =="
        KSU_MARKERS="$(
          find "$COMMON_DIR" \
            -type f \
            -path "*/kernel/include/ksu.h" \
            -print || true
        )"

        if [ -z "$KSU_MARKERS" ]; then
          echo "::error::KernelSU marker kernel/include/ksu.h was not found after setup"
          exit 1
        fi

        KSU_MARKER="$(printf '%s\n' "$KSU_MARKERS" | sort | head -n 1)"
        KSU_ROOT="${KSU_MARKER%/kernel/include/ksu.h}"

        echo "integrated KSU_ROOT=$KSU_ROOT"

        if git -C "$KSU_ROOT" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          INTEGRATED_KSU_HEAD="$(git -C "$KSU_ROOT" rev-parse HEAD)"
          INTEGRATED_KSU_DESCRIBE="$(git -C "$KSU_ROOT" describe --tags --always || git -C "$KSU_ROOT" rev-parse --short HEAD)"

          echo "integrated KSU HEAD: $INTEGRATED_KSU_HEAD"
          echo "integrated KSU describe: $INTEGRATED_KSU_DESCRIBE"
          git -C "$KSU_ROOT" remote -v || true

          if [ -n "$SELECTED_MANAGER_REF" ] && { [ "$MANAGER" = "KernelSU" ] || [ "$MANAGER" = "KowSU" ]; }; then
            if [ "$INTEGRATED_KSU_HEAD" != "$SELECTED_MANAGER_REF" ]; then
              echo "::error::Integrated KernelSU HEAD does not match selected manager ref"
              echo "::error::expected=$SELECTED_MANAGER_REF"
              echo "::error::actual=$INTEGRATED_KSU_HEAD"
              exit 1
            fi
          fi
        else
          echo "::warning::Integrated KSU root is not a git repository; cannot verify exact HEAD"
        fi

        git config --global user.email "bot@github.com"
        git config --global user.name "Workflow Bot"

        git add .
        git commit -m "Integrate ${{ inputs.manager }} and remove dirty tag" || true
