name: Build kernel
description: Build the selected kernel.
inputs:
  lto:
    required: true
    description: LTO mode.
  kernel_version:
    required: true
    description: Kernel version.
  source_mode:
    required: false
    default: "google-lts"
    description: Source mode used by the workflow.
  kmi_bypass:
    required: false
    default: "off"
    description: Experimental opt-in bypass for Kleaf KMI symbol-list strict mode.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        cd kernel

        JOBS="4"
        if [ "${{ inputs.lto }}" = "full" ]; then
          JOBS="2"
          export LLVM_PARALLEL_LINK_JOBS=1
          export LLD_PARALLEL_LINK_JOBS=1
        fi

        export MAKEFLAGS="-j${JOBS}"

        echo "BUILD_ENGINE=$BUILD_ENGINE"
        echo "KERNEL_VERSION=${{ inputs.kernel_version }}"
        echo "SOURCE_MODE=${{ inputs.source_mode }}"
        echo "KMI_BYPASS=${{ inputs.kmi_bypass }}"
        echo "LTO=${{ inputs.lto }}"
        echo "JOBS=$JOBS"
        echo "MAKEFLAGS=$MAKEFLAGS"
        if [ "${{ inputs.lto }}" = "full" ]; then
          echo "LLVM_PARALLEL_LINK_JOBS=$LLVM_PARALLEL_LINK_JOBS"
          echo "LLD_PARALLEL_LINK_JOBS=$LLD_PARALLEL_LINK_JOBS"
        fi

        print_ashmem_kmi_diagnostics() {
          echo
          echo "== ashmem KMI diagnostics =="

          echo "== ashmem config refs =="
          find out common/out -type f -name ".config" -print 2>/dev/null |
            while IFS= read -r config_file; do
              echo "--- $config_file"
              grep -nE 'CONFIG_(ANDROID_)?ASHMEM' "$config_file" || true
            done || true

          echo "== ashmem source files =="
          find drivers/staging/android mm -maxdepth 2 \
            \( -name 'ashmem*' -o -name '*ashmem*' \) -print 2>/dev/null || true

          echo "== ashmem export refs =="
          grep -R -nE 'EXPORT_SYMBOL.*(ashmem_area_name|ashmem_area_size|ashmem_area_vmfile|is_ashmem_file)|ashmem_area_name|ashmem_area_size|ashmem_area_vmfile|is_ashmem_file' \
            drivers/staging/android mm common build 2>/dev/null || true

          echo "== active KMI ashmem symbol-list refs =="
          grep -R -nE 'ashmem_area_name|ashmem_area_size|ashmem_area_vmfile|is_ashmem_file' \
            common/android common build 2>/dev/null || true
        }

        if [ "$BUILD_ENGINE" = "kleaf" ]; then
          unset SKIP_EXT_MODULES SKIP_UNSTRIPPED_MODULES SKIP_MODULES
          echo "Kleaf build: required GKI modules are not skipped"
          bazel_args=(
            "--lto=${{ inputs.lto }}"
            "--defconfig_fragment=//common:private.fragment"
          )

          if [ "${{ inputs.kmi_bypass }}" = "on" ]; then
            if [ "${{ inputs.source_mode }}" = "google-lts" ]; then
              echo "::warning::Ignoring kmi_bypass=on for google-lts; strict KMI remains enabled"
            else
              echo "Kleaf KMI symbol-list strict mode bypass enabled for source_mode=${{ inputs.source_mode }}"
              bazel_args+=("--nokmi_symbol_list_strict_mode")
            fi
          fi

          build_status=0
          tools/bazel run "${bazel_args[@]}" //common:kernel_aarch64_dist -- \
            --dist_dir=out/dist || build_status=$?

          if [ "$build_status" -ne 0 ] && [ "${{ inputs.kernel_version }}" = "6.12" ]; then
            print_ashmem_kmi_diagnostics
          fi

          if [ "$build_status" -ne 0 ] && [ "${{ inputs.kernel_version }}" = "6.12" ]; then
            echo "== rust_binder debug after failed build =="
            find out bazel-out -name 'rust_binder.ko' -print 2>/dev/null || true
            find out bazel-out -name 'modules.order' -print 2>/dev/null |
              while IFS= read -r f; do
                grep -n 'rust_binder' "$f" || true
              done || true
          fi

          if [ "$build_status" -ne 0 ]; then
            exit "$build_status"
          fi
        else
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            export BUILD_CONFIG=common/build.config.coreshift.gki.aarch64
          else
            export BUILD_CONFIG=common/build.config.gki.aarch64
          fi

          export LTO=${{ inputs.lto }}
          export SKIP_MRPROPER=1
          export SKIP_CP_KERNEL_HDRS=1
          export SKIP_UNSTRIPPED_MODULES=1
          export SKIP_DEBUG_INFO=1
          export SKIP_EXT_MODULES=1
          export SKIP_HEADERS_INSTALL=1

          selected_defconfig="$(
            sed -n 's/^[[:space:]]*export[[:space:]]\+DEFCONFIG=//p; s/^[[:space:]]*DEFCONFIG=//p' "$BUILD_CONFIG" |
            tail -n 1
          )"
          selected_fragment="$(
            sed -n 's/^[[:space:]]*export[[:space:]]\+GKI_DEFCONFIG_FRAGMENT=//p; s/^[[:space:]]*GKI_DEFCONFIG_FRAGMENT=//p' "$BUILD_CONFIG" |
            tail -n 1
          )"

          echo "selected BUILD_CONFIG=$BUILD_CONFIG"
          echo "selected DEFCONFIG=${selected_defconfig:-unknown, inherited from sourced build config}"
          if [ -n "$selected_fragment" ]; then
            echo "GKI_DEFCONFIG_FRAGMENT=$selected_fragment"
          else
            echo "GKI_DEFCONFIG_FRAGMENT: unset"
          fi
          echo "private.fragment=common/private.fragment"

          echo
          echo "== clang lookup =="
          echo "PATH=$PATH"
          command -v clang || true
          clang --version | head -n 1 || true

          echo
          echo "== repo clang candidates =="
          find "$GITHUB_WORKSPACE/kernel" -maxdepth 8 -type f -path '*/bin/clang' -print 2>/dev/null | sort | head -80 || true

          echo
          echo "== build config clang refs =="
          grep -R -nE 'CLANG|clang|LLVM|PATH' common/build.config* build 2>/dev/null | head -120 || true

          bash build/build.sh -j"${JOBS}"

          echo
          echo "== final .config candidates =="
          find ./out ./common/out \
            -type f \
            \( -name ".config" -o -name "*.config" -o -name "*kernel*.config" \) \
            ! -path "./common/arch/arm64/configs/*" \
            ! -path "./common/private.fragment" \
            ! -path "./common/private.required" \
            2>/dev/null | sort || true
        fi
