name: Build kernel
description: Build the selected kernel.
inputs:
  lto:
    required: true
    description: LTO mode.
  kernel_version:
    required: true
    description: Kernel version.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        cd kernel

        if [ -n "${CLANG_PATH:-}" ] && [ -x "${CLANG_PATH}/clang" ]; then
          export PATH="${CLANG_PATH}:$PATH"
        elif [ -n "${CLANG_ACTIVE_DIR:-}" ] && [ -x "${CLANG_ACTIVE_DIR}/bin/clang" ]; then
          export PATH="${CLANG_ACTIVE_DIR}/bin:$PATH"
        else
          FALLBACK_CLANG_BIN="$(
            find "${GITHUB_WORKSPACE}/kernel" "${GITHUB_WORKSPACE}/.toolchains" \
              -type f \
              -path '*/bin/clang' \
              -perm -111 \
              2>/dev/null | sort | head -n 1 || true
          )"
          if [ -n "$FALLBACK_CLANG_BIN" ]; then
            export PATH="$(dirname "$FALLBACK_CLANG_BIN"):$PATH"
          fi
        fi

        CLANG_CMD="$(command -v clang || true)"
        echo "command -v clang: ${CLANG_CMD:-not found}"
        if [ -n "$CLANG_CMD" ]; then
          CLANG_VERSION_LINE="$(clang --version | head -n 1 || true)"
          echo "clang version: ${CLANG_VERSION_LINE:-unknown}"
        fi

        if [ -z "$CLANG_CMD" ]; then
          echo "::error::clang is not available in PATH before kernel build"
          exit 1
        fi

        {
          echo
          echo "== build-step compiler environment =="
          echo "clang_selection=${CLANG_SELECTION:-}"
          echo "build_engine=${BUILD_ENGINE:-unknown}"
          echo "clang_override_mode=${CLANG_OVERRIDE_MODE:-}"
          echo "clang_override_root=${CLANG_OVERRIDE_ROOT:-}"
          echo "clang_override_target=${CLANG_OVERRIDE_TARGET:-}"
          echo "clang_active_dir=${CLANG_ACTIVE_DIR:-}"
          echo "clang_path=${CLANG_PATH:-}"
          echo "[command -v clang]"
          echo "$CLANG_CMD"
          echo
          echo "[clang --version]"
          clang --version || true
          echo
          echo "[command -v ld.lld]"
          command -v ld.lld || echo "ld.lld: not found"
          echo
          echo "[ld.lld --version]"
          ld.lld --version || echo "ld.lld: not found"
        } >> "${GITHUB_WORKSPACE}/compiler-version.txt"

        JOBS="4"
        if [ "${{ inputs.lto }}" = "full" ]; then
          JOBS="2"
          export LLVM_PARALLEL_LINK_JOBS=1
          export LLD_PARALLEL_LINK_JOBS=1
        fi

        export MAKEFLAGS="-j${JOBS}"

        echo "BUILD_ENGINE=$BUILD_ENGINE"
        echo "KERNEL_VERSION=${{ inputs.kernel_version }}"
        echo "LTO=${{ inputs.lto }}"
        echo "JOBS=$JOBS"
        echo "MAKEFLAGS=$MAKEFLAGS"
        if [ "${{ inputs.lto }}" = "full" ]; then
          echo "LLVM_PARALLEL_LINK_JOBS=$LLVM_PARALLEL_LINK_JOBS"
          echo "LLD_PARALLEL_LINK_JOBS=$LLD_PARALLEL_LINK_JOBS"
        fi

        if [ "$BUILD_ENGINE" = "kleaf" ]; then
          tools/bazel run \
            --lto=${{ inputs.lto }} \
            --defconfig_fragment=//common:private.fragment \
            //common:kernel_aarch64_dist -- \
            --dist_dir=out/dist
        else
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            export BUILD_CONFIG=common/build.config.coreshift.gki.aarch64
          else
            export BUILD_CONFIG=common/build.config.gki.aarch64
          fi

          export LTO=${{ inputs.lto }}
          export SKIP_MRPROPER=1
          export SKIP_CP_KERNEL_HDRS=1
          export SKIP_UNSTRIPPED_MODULES=1
          export SKIP_DEBUG_INFO=1
          export SKIP_EXT_MODULES=1
          export SKIP_HEADERS_INSTALL=1

          selected_defconfig="$(
            sed -n 's/^[[:space:]]*export[[:space:]]\+DEFCONFIG=//p; s/^[[:space:]]*DEFCONFIG=//p' "$BUILD_CONFIG" |
            tail -n 1
          )"
          selected_fragment="$(
            sed -n 's/^[[:space:]]*export[[:space:]]\+GKI_DEFCONFIG_FRAGMENT=//p; s/^[[:space:]]*GKI_DEFCONFIG_FRAGMENT=//p' "$BUILD_CONFIG" |
            tail -n 1
          )"

          echo "selected BUILD_CONFIG=$BUILD_CONFIG"
          echo "selected DEFCONFIG=${selected_defconfig:-unknown, inherited from sourced build config}"
          if [ -n "$selected_fragment" ]; then
            echo "GKI_DEFCONFIG_FRAGMENT=$selected_fragment"
          else
            echo "GKI_DEFCONFIG_FRAGMENT: unset"
          fi
          echo "private.fragment=common/private.fragment"

          bash build/build.sh -j"${JOBS}"

          echo
          echo "== final .config candidates =="
          find ./out ./common/out \
            -type f \
            \( -name ".config" -o -name "*.config" -o -name "*kernel*.config" \) \
            ! -path "./common/arch/arm64/configs/*" \
            ! -path "./common/private.fragment" \
            ! -path "./common/private.required" \
            2>/dev/null | sort || true
        fi
