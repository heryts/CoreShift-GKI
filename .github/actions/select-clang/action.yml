name: Select Clang
description: Replace the synced kernel Clang prebuilts directory with a curated AOSP Clang symlink.

inputs:
  clang_version:
    required: true
    description: Curated Clang version to use, or default for the repo-synced toolchain.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        CHOICE="${{ inputs.clang_version }}"
        KERNEL_DIR="${GITHUB_WORKSPACE}/kernel"
        TOOLCHAIN_BASE="${GITHUB_WORKSPACE}/.toolchains"
        AOSP_CLANG_DIR="${TOOLCHAIN_BASE}/aosp-clang"
        COMPILER_INFO="${GITHUB_WORKSPACE}/compiler-version.txt"
        LOG_FILE="${TOOLCHAIN_BASE}/clang-override.log"
        AOSP_CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86"

        mkdir -p "$TOOLCHAIN_BASE"

        print_disk_usage() {
          local label="$1"

          echo "== disk usage: $label =="
          df -h
          (
            cd "$GITHUB_WORKSPACE"
            du -sh kernel .toolchains out 2>/dev/null || true
          )
        }

        print_debug() {
          local selected_root="${1:-}"
          local selected_target="${2:-}"
          local candidates_text="${3:-}"
          local broad_scan="${4:-}"

          echo "== clang discovery debug ==" >&2
          echo "workspace=$GITHUB_WORKSPACE" >&2
          echo "searched_roots:" >&2
          printf '%s\n' \
            "${GITHUB_WORKSPACE}/kernel/prebuilts/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/kernel/prebuilts-master/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/prebuilts/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/prebuilts-master/clang/host/linux-x86" >&2
          echo "found_clang_candidates:" >&2
          if [ -n "$candidates_text" ]; then
            printf '%s\n' "$candidates_text" >&2
          else
            echo "(none)" >&2
          fi
          echo "kernel_broad_scan:" >&2
          if [ -n "$broad_scan" ]; then
            printf '%s\n' "$broad_scan" >&2
          else
            echo "(none)" >&2
          fi
          echo "selected_clang_root=${selected_root:-<none>}" >&2
          echo "selected_target_dir=${selected_target:-<none>}" >&2
        }

        find_clang_root_and_target() {
          local root=""
          local candidate=""
          local candidate_dir=""
          local candidates_text=""
          local broad_scan=""
          local line=""

          for root in \
            "${GITHUB_WORKSPACE}/kernel/prebuilts/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/kernel/prebuilts-master/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/prebuilts/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/prebuilts-master/clang/host/linux-x86"; do
            if [ ! -d "$root" ]; then
              continue
            fi

            while IFS= read -r candidate; do
              [ -n "$candidate" ] || continue
              candidates_text="${candidates_text}${candidate}"$'\n'
            done < <(
              find "$root" -maxdepth 2 -path "$root/clang-r*/bin/clang" -type f -perm -111 2>/dev/null || true
            )

            candidate="$(
              find "$root" -maxdepth 2 -path "$root/clang-r*/bin/clang" -type f -perm -111 2>/dev/null | sort | head -n 1 || true
            )"
            if [ -z "$candidate" ]; then
              continue
            fi

            candidate_dir="$(dirname "$(dirname "$candidate")")"
            print_debug "$root" "$candidate_dir" "$candidates_text"
            printf '%s\n%s\n' "$root" "$candidate_dir"
            return 0
          done

          while IFS= read -r line; do
            [ -n "$line" ] || continue
            broad_scan="${broad_scan}${line}"$'\n'

            if [ -n "$candidate" ]; then
              continue
            fi

            case "$line" in
              */clang-r*/bin/clang)
                root="$(dirname "$(dirname "$(dirname "$line")")")"
                candidate_dir="$(dirname "$(dirname "$line")")"
                candidate="$line"
                ;;
            esac
          done < <(
            find "$GITHUB_WORKSPACE/kernel" -maxdepth 7 -type f -path "*/bin/clang" -print 2>/dev/null || true
          )

          if [ -n "$candidate" ]; then
            candidates_text="${candidates_text}${candidate}"$'\n'
            print_debug "$root" "$candidate_dir" "$candidates_text" "$broad_scan"
            printf '%s\n%s\n' "$root" "$candidate_dir"
            return 0
          fi

          print_debug "" "" "$candidates_text" "$broad_scan"
          return 1
        }

        remove_unused_synced_clang_dirs() {
          local root="$1"
          local keep_name="$2"
          local entry=""

          [ -n "$root" ] || return 0
          [ -d "$root" ] || return 0

          while IFS= read -r entry; do
            [ -n "$entry" ] || continue
            if [ "$(basename "$entry")" = "$keep_name" ]; then
              continue
            fi
            rm -rf "$entry"
          done < <(
            find "$root" -mindepth 1 -maxdepth 1 \( -type d -o -type l \) -name 'clang-r*' 2>/dev/null | sort || true
          )
        }

        write_metadata() {
          local selection="$1"
          local selected_dir="$2"
          local target_path="$3"
          local backup_path="$4"
          local clang_bin="$5"
          local lld_bin="$6"

          {
            echo "clang_selection=$selection"
            echo "selected_dir=$selected_dir"
            echo "override_target=$target_path"
            echo "backup_path=$backup_path"
            echo
            echo "[clang --version]"
            "$clang_bin" --version
            echo
            echo "[ld.lld --version]"
            "$lld_bin" --version
            echo
            echo "Compare this file against uname -a or /proc/version after boot."
          } | tee "$COMPILER_INFO" > "$LOG_FILE"
        }

        print_disk_usage "before clang selection"

        DETECTED_PATHS=()
        if mapfile -t DETECTED_PATHS < <(find_clang_root_and_target); then
          if [ "${#DETECTED_PATHS[@]}" -lt 2 ]; then
            echo "::error::Clang discovery did not return the expected root and target"
            exit 1
          fi
          CLANG_ROOT="${DETECTED_PATHS[-2]}"
          TARGET_CLANG_DIR="${DETECTED_PATHS[-1]}"
          TARGET_CLANG_NAME="$(basename "$TARGET_CLANG_DIR")"
          BACKUP_CLANG_DIR="${TARGET_CLANG_DIR}.original"
          ACTIVE_CLANG_DIR="$TARGET_CLANG_DIR"
        else
          CLANG_ROOT=""
          TARGET_CLANG_DIR=""
          TARGET_CLANG_NAME=""
          BACKUP_CLANG_DIR=""
          ACTIVE_CLANG_DIR=""
        fi

        if [ "$CHOICE" = "default" ]; then
          if [ -n "$TARGET_CLANG_DIR" ]; then
            CLANG_BIN="$TARGET_CLANG_DIR/bin/clang"
            LLD_BIN="$TARGET_CLANG_DIR/bin/ld.lld"

            if [ ! -x "$CLANG_BIN" ] || [ ! -x "$LLD_BIN" ]; then
              echo "::error::Detected synced Clang directory is missing expected binaries under $TARGET_CLANG_DIR"
              exit 1
            fi

            echo "== default synced Clang =="
            echo "target_dir=$TARGET_CLANG_DIR"
          else
            CLANG_BIN="$(command -v clang || true)"
            LLD_BIN="$(command -v ld.lld || true)"

            if [ -z "$CLANG_BIN" ] || [ -z "$LLD_BIN" ]; then
              echo "::error::No repo-synced Clang directory was found and PATH clang/ld.lld are unavailable"
              exit 1
            fi

            echo "== default PATH Clang =="
            echo "target_dir=<none>"
            ACTIVE_CLANG_DIR="$(dirname "$(dirname "$CLANG_BIN")")"
          fi

          "$CLANG_BIN" --version

          {
            echo "CLANG_SELECTION=default"
            echo "CLANG_OVERRIDE_ROOT=$CLANG_ROOT"
            echo "CLANG_OVERRIDE_TARGET=$TARGET_CLANG_DIR"
            echo "CLANG_OVERRIDE_TARGET_NAME=$TARGET_CLANG_NAME"
            echo "CLANG_ACTIVE_DIR=$ACTIVE_CLANG_DIR"
            echo "CLANG_BACKUP_DIR="
          } >> "$GITHUB_ENV"

          write_metadata "default" "$ACTIVE_CLANG_DIR" "$TARGET_CLANG_DIR" "" "$CLANG_BIN" "$LLD_BIN"
          print_disk_usage "after clang selection"
          exit 0
        fi

        if [ -z "$TARGET_CLANG_DIR" ]; then
          echo "::error::This branch/build path does not expose a repo-synced Clang directory under $GITHUB_WORKSPACE/kernel, so symlink override is unavailable."
          exit 1
        fi

        rm -rf "$AOSP_CLANG_DIR"
        git clone --depth=1 --filter=blob:none --sparse "$AOSP_CLANG_URL" "$AOSP_CLANG_DIR"
        git -C "$AOSP_CLANG_DIR" sparse-checkout set --cone "$CHOICE"

        SELECTED_CLANG_DIR="$AOSP_CLANG_DIR/$CHOICE"
        CLANG_BIN="$SELECTED_CLANG_DIR/bin/clang"
        LLD_BIN="$SELECTED_CLANG_DIR/bin/ld.lld"

        if [ ! -x "$CLANG_BIN" ] || [ ! -x "$LLD_BIN" ]; then
          print_debug "$CLANG_ROOT" "$TARGET_CLANG_DIR" "$SELECTED_CLANG_DIR/bin/clang"$'\n'"$SELECTED_CLANG_DIR/bin/ld.lld"
          echo "::error::Selected curated Clang is missing expected binaries under $SELECTED_CLANG_DIR"
          exit 1
        fi

        echo "== curated Clang override =="
        echo "selection=$CHOICE"
        echo "selected_dir=$SELECTED_CLANG_DIR"
        echo "override_target=$TARGET_CLANG_DIR"

        rm -rf "$TARGET_CLANG_DIR"
        ln -s "$SELECTED_CLANG_DIR" "$TARGET_CLANG_DIR"

        if [ ! -L "$TARGET_CLANG_DIR" ]; then
          print_debug "$CLANG_ROOT" "$TARGET_CLANG_DIR" "$TARGET_CLANG_DIR"
          echo "::error::Expected symlink override was not created at $TARGET_CLANG_DIR"
          exit 1
        fi

        remove_unused_synced_clang_dirs "$CLANG_ROOT" "$TARGET_CLANG_NAME"

        ACTIVE_CLANG_DIR="$SELECTED_CLANG_DIR"
        BACKUP_CLANG_DIR=""

        {
          echo "CLANG_SELECTION=$CHOICE"
          echo "CLANG_OVERRIDE_ROOT=$CLANG_ROOT"
          echo "CLANG_OVERRIDE_TARGET=$TARGET_CLANG_DIR"
          echo "CLANG_OVERRIDE_TARGET_NAME=$TARGET_CLANG_NAME"
          echo "CLANG_ACTIVE_DIR=$ACTIVE_CLANG_DIR"
          echo "CLANG_BACKUP_DIR=$BACKUP_CLANG_DIR"
        } >> "$GITHUB_ENV"

        write_metadata "$CHOICE" "$ACTIVE_CLANG_DIR" "$TARGET_CLANG_DIR" "$BACKUP_CLANG_DIR" "$CLANG_BIN" "$LLD_BIN"
        print_disk_usage "after clang selection"
