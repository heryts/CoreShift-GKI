name: Add swap
description: Add swap for LTO builds.
inputs:
  size_gb:
    required: true
    description: Requested swap size in GiB.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        SIZE_GB="${{ inputs.size_gb }}"
        if ! [ "$SIZE_GB" -ge 1 ] 2>/dev/null; then
          echo "::error::size_gb must be a positive integer, got: $SIZE_GB"
          exit 1
        fi

        SIZE_BYTES="$((SIZE_GB * 1024 * 1024 * 1024))"
        FALLBACK_GB="$((SIZE_GB / 2))"
        if [ "$FALLBACK_GB" -lt 4 ]; then
          FALLBACK_GB=4
        fi
        if [ "$FALLBACK_GB" -gt "$SIZE_GB" ]; then
          FALLBACK_GB="$SIZE_GB"
        fi
        FALLBACK_BYTES="$((FALLBACK_GB * 1024 * 1024 * 1024))"

        echo "== resources before swap =="
        free -h || true
        swapon --show || true
        df -h / || true

        echo
        echo "== try zram swap =="
        sudo modprobe zram || true

        if [ -b /dev/zram0 ]; then
          if [ -f /sys/block/zram0/comp_algorithm ] &&
            grep -qw lz4 /sys/block/zram0/comp_algorithm; then
            echo lz4 | sudo tee /sys/block/zram0/comp_algorithm >/dev/null || true
          fi

          if echo "${SIZE_GB}G" | sudo tee /sys/block/zram0/disksize >/dev/null &&
            sudo mkswap /dev/zram0 &&
            sudo swapon -p 100 /dev/zram0; then
            echo "zram swap enabled on /dev/zram0"
          else
            echo "::warning::zram swap setup failed; continuing with disk swap"
          fi
        else
          echo "zram unavailable; continuing with disk swap"
        fi

        try_swap() {
          size="$1"
          label="$2"

          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile

          echo "== creating ${label} swap with fallocate =="
          if ! sudo fallocate -l "$size" /swapfile; then
            echo "::warning::fallocate ${label} swap failed; trying dd"
            sudo rm -f /swapfile
            if ! sudo dd if=/dev/zero of=/swapfile bs=1M count="$((size / 1024 / 1024))" status=progress; then
              echo "::warning::dd ${label} swap failed"
              sudo rm -f /swapfile
              return 1
            fi
          fi

          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon -p 10 /swapfile
        }

        if ! try_swap "$SIZE_BYTES" "${SIZE_GB}G"; then
          echo "::warning::${SIZE_GB}G swap setup failed; falling back to ${FALLBACK_GB}G"
          if ! try_swap "$FALLBACK_BYTES" "${FALLBACK_GB}G"; then
            if [ "$FALLBACK_GB" -ne 4 ]; then
              echo "::warning::${FALLBACK_GB}G swap setup failed; falling back to 4G"
              try_swap "$((4 * 1024 * 1024 * 1024))" "4G"
            fi
          fi
        fi

        echo "== resources after swap =="
        free -h || true
        swapon --show || true
        df -h / || true
