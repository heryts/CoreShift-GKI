name: Apply IPC KABI patches
description: Apply optional SYSVIPC and 5.10 POSIX_MQUEUE KABI patches.
inputs:
  kernel_version:
    required: true
    description: Kernel version to patch.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        cd kernel/common

        PATCH_URL="https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch"
        PATCH_FILE="/tmp/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch"

        echo "== downloading SYSVIPC KABI patch =="
        curl -fsSL "$PATCH_URL" -o "$PATCH_FILE"

        echo "== patch preview =="
        sed -n '1,120p' "$PATCH_FILE"

        echo "== checking SYSVIPC KABI patch =="
        if git apply --check "$PATCH_FILE"; then
          git apply "$PATCH_FILE"
          echo "SYSVIPC KABI patch applied."
        else
          echo "::warning::SYSVIPC KABI patch does not apply cleanly to this branch."
          echo "::warning::Continuing anyway; build/KMI may fail if this branch requires the patch."
        fi

        if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
          PATCH_URL="https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"
          PATCH_FILE="/tmp/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"

          echo "== downloading POSIX_MQUEUE KABI patch =="
          curl -fsSL "$PATCH_URL" -o "$PATCH_FILE"

          echo "== patch preview =="
          sed -n '1,160p' "$PATCH_FILE"

          echo "== checking POSIX_MQUEUE KABI patch =="
          if git apply --check "$PATCH_FILE"; then
            git apply "$PATCH_FILE"
            echo "POSIX_MQUEUE KABI patch applied."
          else
            echo "::warning::POSIX_MQUEUE KABI patch does not apply cleanly to this branch."
            echo "::warning::Continuing anyway; build/KMI may fail if this branch requires the patch."
          fi
        fi
