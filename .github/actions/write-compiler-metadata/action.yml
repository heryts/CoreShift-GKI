name: Write compiler metadata
description: Write compiler metadata after successful build.

inputs:
  kernel_version:
    required: true
    description: Selected kernel version for this build.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        CLANG_PATH="$(command -v clang || true)"
        LLD_PATH="$(command -v ld.lld || true)"

        {
          echo
          echo "== post-build compiler metadata =="
          echo "kernel_version=${{ inputs.kernel_version }}"
          echo "clang_selection=${CLANG_SELECTION:-default}"
          echo "clang_override_target=${CLANG_OVERRIDE_TARGET:-}"
          echo "clang_active_dir=${CLANG_ACTIVE_DIR:-}"
          echo "clang_backup_dir=${CLANG_BACKUP_DIR:-}"
          echo "build_engine=${BUILD_ENGINE:-unknown}"
          echo "date=${DATE:-unknown}"
          echo "github_run_number=${GITHUB_RUN_NUMBER:-unknown}"

          echo
          echo "== clang =="
          if [ -n "$CLANG_PATH" ]; then
            echo "$CLANG_PATH"
            clang --version || echo "clang --version failed"
          else
            echo "clang: not found"
          fi

          echo
          echo "== ld.lld =="
          if [ -n "$LLD_PATH" ]; then
            echo "$LLD_PATH"
            ld.lld --version || echo "ld.lld --version failed"
          else
            echo "ld.lld: not found"
          fi
        } >> "${GITHUB_WORKSPACE}/compiler-version.txt"

        echo "== compiler-version.txt =="
        cat "${GITHUB_WORKSPACE}/compiler-version.txt"
