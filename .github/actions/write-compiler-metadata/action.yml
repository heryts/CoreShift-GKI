name: Write compiler metadata
description: Write compiler metadata after successful build.

inputs:
  kernel_version:
    required: true
    description: Selected kernel version for this build.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        DETECTED_CLANG_BIN="$(command -v clang || true)"
        DETECTED_LLD_BIN="$(command -v ld.lld || true)"

        {
          echo
          echo "== post-build compiler metadata =="
          echo "kernel_version=${{ inputs.kernel_version }}"
          echo "build_engine=${BUILD_ENGINE:-unknown}"
          echo "date=${DATE:-unknown}"
          echo "github_run_number=${GITHUB_RUN_NUMBER:-unknown}"

          echo
          echo "== command -v clang =="
          if [ -n "$DETECTED_CLANG_BIN" ]; then
            echo "$DETECTED_CLANG_BIN"
          else
            echo "clang: not found"
          fi

          echo
          echo "== clang --version =="
          if [ -n "$DETECTED_CLANG_BIN" ]; then
            clang --version || true
          else
            echo "clang: not found"
          fi

          echo
          echo "== command -v ld.lld =="
          if [ -n "$DETECTED_LLD_BIN" ]; then
            echo "$DETECTED_LLD_BIN"
          else
            echo "ld.lld: not found"
          fi

          echo
          echo "== ld.lld --version =="
          if [ -n "$DETECTED_LLD_BIN" ]; then
            ld.lld --version || true
          else
            echo "ld.lld: not found"
          fi
        } >> "${GITHUB_WORKSPACE}/compiler-version.txt"

        echo "== compiler-version.txt =="
        cat "${GITHUB_WORKSPACE}/compiler-version.txt"
