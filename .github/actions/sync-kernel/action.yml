name: Sync kernel
description: Sync Android common kernel source for selected branch.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        print_disk_usage() {
          local label="$1"

          echo "== disk usage: $label =="
          df -h
          (
            cd "$GITHUB_WORKSPACE"
            du -sh kernel .toolchains out 2>/dev/null || true
          )
        }

        print_disk_usage "before source sync"

        mkdir kernel
        cd kernel

        repo init \
          -u https://android.googlesource.com/kernel/manifest \
          -b "$BRANCH" \
          --depth=1 \
          --quiet

        repo sync \
          -c \
          -j"$(nproc)" \
          --force-sync \
          --no-tags \
          --no-clone-bundle \
          --optimized-fetch \
          --current-branch

        print_disk_usage "after source sync"
