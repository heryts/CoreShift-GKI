name: Sync kernel
description: Sync Android common kernel source for selected branch.
inputs:
  source_mode:
    required: false
    default: "google-lts"
    description: Select official, Pixel, or maintained/custom minimal sync path.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        print_disk_usage() {
          local label="$1"

          echo "== disk usage: $label =="
          df -h
          (
            cd "$GITHUB_WORKSPACE"
            du -sh kernel kernel/.repo .toolchains out 2>/dev/null || true
          )
        }

        print_disk_usage "before source sync"

        mkdir kernel
        cd kernel

        source_mode="${{ inputs.source_mode }}"
        manifest_mode="official"
        local_manifest_src=""
        removed_project_count=0
        expected_project_count=""

        echo "== repo init start: $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
        init_start_epoch="$(date +%s)"

        init_help="$(repo init --help 2>&1 || true)"
        init_flags=()

        if grep -q -- '--depth' <<< "$init_help"; then
          init_flags+=(--depth=1)
        fi
        if grep -q -- '--partial-clone' <<< "$init_help"; then
          init_flags+=(--partial-clone)
        fi
        if grep -q -- '--clone-filter' <<< "$init_help"; then
          init_flags+=(--clone-filter=blob:none)
        fi

        echo "repo init optimization flags: ${init_flags[*]:-none}"

        repo init \
          -u https://android.googlesource.com/kernel/manifest \
          -b "$BRANCH" \
          --quiet \
          "${init_flags[@]}"

        echo "== repo init end: $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
        init_end_epoch="$(date +%s)"
        echo "repo init duration_sec=$((init_end_epoch - init_start_epoch))"

        official_manifest_file=".repo/manifests/default.xml"
        official_project_count="$(
          grep -c '<project ' "$official_manifest_file" 2>/dev/null || true
        )"
        official_project_count="${official_project_count:-0}"

        case "$source_mode" in
          google-lts|pixel)
            ;;
          maintained|custom)
            local_manifest_src="$GITHUB_WORKSPACE/.github/manifests/minimal/${BRANCH}.xml"
            if [ ! -f "$local_manifest_src" ]; then
              echo "::error::missing minimal manifest for branch=$BRANCH: $local_manifest_src"
              exit 1
            fi

            mkdir -p .repo/local_manifests
            cp "$local_manifest_src" .repo/local_manifests/coreshift-minimal.xml

            manifest_mode="minimal"
            removed_project_count="$(
              grep -c '<remove-project ' "$local_manifest_src" 2>/dev/null || true
            )"
            removed_project_count="${removed_project_count:-0}"
            expected_project_count="$((official_project_count - removed_project_count))"

            echo "== minimal manifest =="
            echo "source=$local_manifest_src"
            echo "removed_project_count=$removed_project_count"
            sed -n 's/.*name=\"\([^\"]*\)\".*/removed_project=\1/p' "$local_manifest_src"
            ;;
          *)
            echo "::error::unsupported source_mode=$source_mode"
            exit 1
            ;;
        esac

        echo "manifest_mode=$manifest_mode"
        echo "source_mode=$source_mode"
        echo "official_project_count=$official_project_count"
        if [ -n "$expected_project_count" ]; then
          echo "expected_synced_project_count=$expected_project_count"
        fi

        print_disk_usage "after repo init"

        sync_jobs="${SYNC_JOBS:-4}"

        echo "== repo sync start: $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
        echo "repo sync jobs: $sync_jobs"
        sync_start_epoch="$(date +%s)"

        if ! repo sync \
          -c \
          --no-tags \
          --no-clone-bundle \
          --optimized-fetch \
          -j"${sync_jobs}"
        then
          echo "::warning::lightweight sync with optimized-fetch failed, retrying without optimized-fetch"
          repo sync \
            -c \
            --no-tags \
            --no-clone-bundle \
            -j"${sync_jobs}"
        fi

        echo "== repo sync end: $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
        sync_end_epoch="$(date +%s)"
        echo "repo sync duration_sec=$((sync_end_epoch - sync_start_epoch))"

        synced_project_count="$(
          repo list 2>/dev/null | wc -l | tr -d '[:space:]'
        )"
        echo "synced_project_count=${synced_project_count:-0}"
        echo "== synced projects =="
        repo list 2>/dev/null | sed -n '1,160p'

        if [ "$BUILD_ENGINE" = "legacy" ]; then
          echo
          echo "== legacy clang candidates =="
          find "$GITHUB_WORKSPACE/kernel" -maxdepth 8 -type f -path '*/prebuilts-master/clang/*/bin/clang' -print 2>/dev/null | sort | head -20 || true
          find "$GITHUB_WORKSPACE/kernel" -maxdepth 8 -type f -path '*/prebuilts/clang/*/bin/clang' -print 2>/dev/null | sort | head -20 || true
        fi

        print_disk_usage "after source sync"
