name: Build Kernel (GKI LTS)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]

      manager:
        type: choice
        required: true
        options: ["Vanilla", "KernelSU-Next", "KernelSU", "KowSU", "ResukiSU", "Rissu", "Wild_KSU"]
        default: "Vanilla"

      manager_ref:
        description: "Optional manager git ref/commit/tag"
        required: false
        default: ""

      lto:
        type: choice
        required: true
        options: ["thin", "full", "none"]
        default: "thin"

      ikconfig:
        description: "Expose final kernel config through /proc/config.gz"
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"

      container_core:
        description: "Enable core container primitives: namespaces, userns, cgroups, devtmpfs, seccomp"
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"

      container_ipc:
        description: "Enable extra IPC primitives: SYSVIPC, POSIX mqueue, and related KABI patches"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      mount_filesystems:
        description: "Enable mount/container filesystem helpers: tmpfs xattr/ACL, overlayfs, fuse"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      susfs:
        description: "Apply SUSFS4KSU patches"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      baseband_guard:
        description: "Apply Baseband Guard"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      container_networking:
        description: "Enable TUN/VETH/BRIDGE/NETFILTER/XTABLES helpers"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      fq_codel_features:
        description: "Enable FQ/FQ_CODEL queue disciplines, keep TCP default as cubic"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      performance_features:
        description: "Enable PSI + BBR/FQ networking tweaks"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      debug_features:
        description: "Enable kprobes/uprobe/ftrace debugging features"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      heavy_debug_features:
        description: "Enable heavier debug/symbol/filesystem extras: KALLSYMS_ALL/KASAN/BTRFS"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      strict_config:
        description: "Fail build if requested configs do not land in final .config"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"

      legacy_kmi_check:
        description: "5.10 legacy: keep strict GKI KMI symbol-list check. Set off only for private builds."
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set variables
        uses: ./.github/actions/setup-vars
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install host tools
        uses: ./.github/actions/install-host-tools
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install repo
        uses: ./.github/actions/install-repo

      - name: Sync source
        uses: ./.github/actions/sync-kernel

      - name: Init manager
        if: ${{ inputs.manager != 'Vanilla' }}
        uses: ./.github/actions/init-manager
        with:
          manager: ${{ inputs.manager }}
          manager_ref: ${{ inputs.manager_ref }}
          susfs: ${{ inputs.susfs }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply SUSFS4KSU patches
        if: ${{ inputs.susfs == 'on' }}
        uses: ./.github/actions/apply-susfs
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}

      - name: Apply Baseband Guard
        if: ${{ inputs.baseband_guard == 'on' }}
        uses: ./.github/actions/apply-baseband-guard
        with:
          baseband_guard: ${{ inputs.baseband_guard }}

      - name: Create private config fragment
        uses: ./.github/actions/create-config-fragment
        with:
          ikconfig: ${{ inputs.ikconfig }}
          container_core: ${{ inputs.container_core }}
          container_ipc: ${{ inputs.container_ipc }}
          mount_filesystems: ${{ inputs.mount_filesystems }}
          container_networking: ${{ inputs.container_networking }}
          fq_codel_features: ${{ inputs.fq_codel_features }}
          performance_features: ${{ inputs.performance_features }}
          debug_features: ${{ inputs.debug_features }}
          heavy_debug_features: ${{ inputs.heavy_debug_features }}
          susfs: ${{ inputs.susfs }}
          baseband_guard: ${{ inputs.baseband_guard }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply IPC KABI patches
        if: ${{ inputs.container_ipc == 'on' }}
        uses: ./.github/actions/apply-ipc-kabi-patches
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply fragment to legacy defconfig
        if: ${{ inputs.kernel_version == '5.10' }}
        uses: ./.github/actions/apply-legacy-defconfig

      - name: Disable legacy 5.10 defconfig normalization check
        if: ${{ inputs.kernel_version == '5.10' }}
        uses: ./.github/actions/disable-legacy-defconfig-check

      - name: Disable legacy 5.10 strict KMI check for private build
        if: ${{ inputs.kernel_version == '5.10' && inputs.legacy_kmi_check == 'off' }}
        uses: ./.github/actions/disable-legacy-kmi-check

      - name: Add swap for full LTO
        if: ${{ inputs.lto == 'full' }}
        uses: ./.github/actions/add-swap

      - name: Commit kernel changes
        uses: ./.github/actions/commit-kernel-changes

      - name: Build kernel
        uses: ./.github/actions/build-kernel
        with:
          lto: ${{ inputs.lto }}

      - name: Verify final config
        if: always()
        uses: ./.github/actions/verify-final-config
        with:
          strict_config: ${{ inputs.strict_config }}

      - name: Package
        uses: ./.github/actions/package-kernel
        with:
          manager: ${{ inputs.manager }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_NAME }}
          name: ${{ env.FINAL_NAME }}
          files: |
            *.zip
            out/Image-*
          body: |
            - Upstream: ${{ env.UPSTREAM_VER }}
            - Manager: ${{ inputs.manager }}
            - LTO: ${{ inputs.lto }}
            - IKCONFIG: ${{ inputs.ikconfig }}
            - Container core: ${{ inputs.container_core }}
            - Container IPC: ${{ inputs.container_ipc }}
            - Mount filesystems: ${{ inputs.mount_filesystems }}
            - SUSFS4KSU: ${{ inputs.susfs }}
            - Baseband Guard: ${{ inputs.baseband_guard }}
            - Container networking: ${{ inputs.container_networking }}
            - FQ/FQ_CODEL features: ${{ inputs.fq_codel_features }}
            - Performance features: ${{ inputs.performance_features }}
            - Debug features: ${{ inputs.debug_features }}
            - Heavy debug features: ${{ inputs.heavy_debug_features }}
            - Strict config verification: ${{ inputs.strict_config }}
            - Legacy KMI check: ${{ inputs.legacy_kmi_check }}
            - Date: ${{ env.DATE }}
            - Engine: ${{ env.BUILD_ENGINE }}
