name: Build Kernel Release Matrix

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.kernel_version }} / ${{ matrix.manager }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel_version: ["5.10", "6.1", "6.6"]
        manager: ["Vanilla", "KernelSU", "KernelSU-Next", "KowSU", "ResukiSU", "Rissu", "Wild_KSU"]

    permissions:
      contents: read

    env:
      LTO: thin
      IKCONFIG: "on"
      CONTAINER_CORE: "on"
      CONTAINER_IPC: "off"
      MOUNT_FILESYSTEMS: "on"
      CONTAINER_NETWORKING: "off"
      FQ_CODEL_FEATURES: "off"
      PERFORMANCE_FEATURES: "off"
      DEBUG_FEATURES: "off"
      HEAVY_DEBUG_FEATURES: "off"
      BASEBAND_GUARD: "off"
      STRICT_CONFIG: "off"
      LEGACY_KMI_CHECK: "on"

    steps:
      - name: Select variant
        id: variant
        shell: bash
        run: |
          set -euo pipefail

          kernel_version="${{ matrix.kernel_version }}"
          manager="${{ matrix.manager }}"
          susfs="off"
          build_variant="false"

          if [ "$manager" = "Vanilla" ]; then
            build_variant="true"
          else
            case "$manager:$kernel_version" in
              KernelSU:5.10|KernelSU:6.1|KernelSU:6.6|KowSU:5.10|KowSU:6.1|KowSU:6.6)
                susfs="on"
                build_variant="true"
                ;;
            esac
          fi

          if [ "$build_variant" != "true" ]; then
            echo "Skipping unsupported SUSFS variant: manager=$manager kernel_version=$kernel_version"
          fi

          {
            echo "build_variant=$build_variant"
            echo "susfs=$susfs"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.variant.outputs.build_variant == 'true'
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set variables
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/setup-vars
        with:
          kernel_version: ${{ matrix.kernel_version }}

      - name: Install host tools
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/install-host-tools
        with:
          kernel_version: ${{ matrix.kernel_version }}

      - name: Install repo
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/install-repo

      - name: Sync source
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/sync-kernel

      - name: Init manager
        if: steps.variant.outputs.build_variant == 'true' && matrix.manager != 'Vanilla'
        uses: ./.github/actions/init-manager
        with:
          manager: ${{ matrix.manager }}
          manager_ref: ""
          susfs: ${{ steps.variant.outputs.susfs }}
          kernel_version: ${{ matrix.kernel_version }}

      - name: Apply SUSFS4KSU patches
        if: steps.variant.outputs.build_variant == 'true' && steps.variant.outputs.susfs == 'on'
        uses: ./.github/actions/apply-susfs
        with:
          kernel_version: ${{ matrix.kernel_version }}
          manager: ${{ matrix.manager }}

      - name: Create private config fragment
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/create-config-fragment
        with:
          ikconfig: ${{ env.IKCONFIG }}
          container_core: ${{ env.CONTAINER_CORE }}
          container_ipc: ${{ env.CONTAINER_IPC }}
          mount_filesystems: ${{ env.MOUNT_FILESYSTEMS }}
          container_networking: ${{ env.CONTAINER_NETWORKING }}
          fq_codel_features: ${{ env.FQ_CODEL_FEATURES }}
          performance_features: ${{ env.PERFORMANCE_FEATURES }}
          debug_features: ${{ env.DEBUG_FEATURES }}
          heavy_debug_features: ${{ env.HEAVY_DEBUG_FEATURES }}
          susfs: ${{ steps.variant.outputs.susfs }}
          baseband_guard: ${{ env.BASEBAND_GUARD }}
          kernel_version: ${{ matrix.kernel_version }}

      - name: Apply IPC KABI patches
        if: steps.variant.outputs.build_variant == 'true' && env.CONTAINER_IPC == 'on'
        uses: ./.github/actions/apply-ipc-kabi-patches
        with:
          kernel_version: ${{ matrix.kernel_version }}

      - name: Install legacy private fragment hook
        if: steps.variant.outputs.build_variant == 'true' && matrix.kernel_version == '5.10'
        uses: ./.github/actions/install-legacy-private-fragment
        with:
          strict_config: ${{ env.STRICT_CONFIG }}

      - name: Disable legacy 5.10 defconfig normalization check
        if: steps.variant.outputs.build_variant == 'true' && matrix.kernel_version == '5.10'
        uses: ./.github/actions/disable-legacy-defconfig-check

      - name: Disable legacy 5.10 strict KMI check for private build
        if: steps.variant.outputs.build_variant == 'true' && matrix.kernel_version == '5.10' && env.LEGACY_KMI_CHECK == 'off'
        uses: ./.github/actions/disable-legacy-kmi-check

      - name: Add swap for full LTO
        if: steps.variant.outputs.build_variant == 'true' && env.LTO == 'full'
        uses: ./.github/actions/add-swap

      - name: Guard legacy gki_defconfig
        if: steps.variant.outputs.build_variant == 'true' && matrix.kernel_version == '5.10'
        shell: bash
        run: |
          set -euo pipefail

          cd kernel

          if ! git -C common diff --exit-code -- arch/arm64/configs/gki_defconfig; then
            echo "::error::common/arch/arm64/configs/gki_defconfig changed; private.fragment must apply only to generated .config"
            exit 1
          fi

      - name: Commit kernel changes
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/commit-kernel-changes

      - name: Build kernel
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/build-kernel
        with:
          lto: ${{ env.LTO }}

      - name: Verify final config
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/verify-final-config
        with:
          strict_config: ${{ env.STRICT_CONFIG }}

      - name: Package
        if: steps.variant.outputs.build_variant == 'true'
        uses: ./.github/actions/package-kernel
        with:
          kernel_version: ${{ matrix.kernel_version }}
          manager: ${{ matrix.manager }}
          susfs: ${{ steps.variant.outputs.susfs }}

      - name: Write release manifest
        if: steps.variant.outputs.build_variant == 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "kernel_version=${{ matrix.kernel_version }}"
            echo "manager=${{ matrix.manager }}"
            echo "susfs=${{ steps.variant.outputs.susfs }}"
            echo "name=${FINAL_NAME}"
          } > release-manifest.txt

      - name: Upload build artifact
        if: steps.variant.outputs.build_variant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.kernel_version }}-${{ matrix.manager }}-susfs-${{ steps.variant.outputs.susfs }}-${{ env.DATE }}
          path: |
            *.zip
            out/Image-*
            release-manifest.txt
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail

          date="$(date +'%Y%m%d')"
          tag="coreshift-gki-${date}-${GITHUB_RUN_NUMBER}"
          release_dir="$PWD/release-files"
          body="$PWD/release-body.md"

          mkdir -p "$release_dir"

          find release-artifacts -type f \( -name '*.zip' -o -name 'Image-*' \) -print0 |
            while IFS= read -r -d '' file; do
              cp "$file" "$release_dir/$(basename "$file")"
            done

          if ! find "$release_dir" -type f -print -quit | grep -q .; then
            echo "::error::No build artifacts found for release."
            exit 1
          fi

          {
            echo "Coreshift GKI release matrix"
            echo
            echo "- LTO: thin"
            echo "- IKCONFIG: on"
            echo "- Container core: on"
            echo "- Container IPC: off"
            echo "- Mount filesystems: on"
            echo "- Container networking: off"
            echo "- FQ/FQ_CODEL features: off"
            echo "- Performance features: off"
            echo "- Baseband Guard: off"
            echo "- Strict config verification: off"
            echo "- Legacy KMI check: on"
            echo "- Date: $date"
            echo

            for version in 5.10 6.1 6.6; do
              echo "## $version"

              version_lines="$(
                while IFS= read -r manifest; do
                  kernel_version="$(sed -n 's/^kernel_version=//p' "$manifest")"
                  manager="$(sed -n 's/^manager=//p' "$manifest")"
                  susfs="$(sed -n 's/^susfs=//p' "$manifest")"

                  if [ "$kernel_version" = "$version" ]; then
                    printf -- '- %s: SUSFS %s\n' "$manager" "$susfs"
                  fi
                done < <(find release-artifacts -type f -name release-manifest.txt | sort) |
                sort
              )"

              if [ -n "$version_lines" ]; then
                printf '%s\n' "$version_lines"
              else
                echo "- No artifacts produced"
              fi

              echo
            done
          } > "$body"

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_BODY=$body" >> "$GITHUB_ENV"

          echo "== release files =="
          find "$release_dir" -type f -printf '%f\n' | sort
          echo
          echo "== release body =="
          cat "$body"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: release-files/*
          body_path: ${{ env.RELEASE_BODY }}
