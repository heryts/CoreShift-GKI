name: Build Kernel GKI LTS Stable

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]
        default: "5.10"
      manager:
        type: choice
        required: true
        options: ["Vanilla", "KernelSU", "KernelSU-Next", "KowSU", "ResukiSU", "Rissu", "Wild_KSU"]
        default: "Vanilla"
      manager_ref:
        description: "Optional manager git ref/commit/tag"
        required: false
        default: ""
      source_repo:
        description: "Optional git repo URL to replace kernel/common"
        required: false
        default: ""
      source_ref:
        description: "Optional source git ref/branch/tag/commit"
        required: false
        default: ""
      clang_version:
        type: choice
        required: true
        options: ["default", "clang-r584948", "clang-r547379"]
        default: "default"
      lto:
        type: choice
        required: true
        options: ["thin", "full", "none"]
        default: "thin"
      susfs:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      baseband_guard:
        description: "Apply Baseband Guard / BBG patches"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      publish_mode:
        description: "Choose where the build is uploaded"
        type: choice
        required: true
        options: ["artifact", "release"]
        default: "artifact"

jobs:
  build:
    name: ${{ inputs.kernel_version }} / ${{ inputs.manager }} / SUSFS ${{ inputs.susfs }} / BBG ${{ inputs.baseband_guard }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      # Hidden stable defaults copied from custom.yml so Build.yml keeps the
      # same config-fragment flow without exposing experimental toggles.
      IKCONFIG: "on"
      CONTAINER_CORE: "off"
      CONTAINER_IPC: "off"
      MOUNT_FILESYSTEMS: "on"
      CONTAINER_NETWORKING: "off"
      FQ_CODEL_FEATURES: "off"
      PERFORMANCE_FEATURES: "off"
      DEBUG_FEATURES: "off"
      HEAVY_DEBUG_FEATURES: "off"
      STRICT_CONFIG: "on"
      LEGACY_KMI_CHECK: "on"
      PUBLISH_MODE: ${{ inputs.publish_mode }}

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.manager }}" = "Vanilla" ] && [ "${{ inputs.susfs }}" = "on" ]; then
            echo "::error::SUSFS requires a KernelSU-compatible manager; manager=Vanilla cannot use susfs=on"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set variables
        uses: ./.github/actions/setup-vars
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Set build output name
        id: build-name
        shell: bash
        run: |
          set -euo pipefail

          susfs_label=""
          if [ "${{ inputs.susfs }}" = "on" ]; then
            susfs_label="-susfs"
          fi

          bbg_label=""
          if [ "${{ inputs.baseband_guard }}" = "on" ]; then
            bbg_label="-bbg"
          fi

          variant_suffix="${susfs_label}${bbg_label}"
          final_name="build-${{ inputs.kernel_version }}-${{ inputs.manager }}${variant_suffix}-${DATE}-${{ github.run_number }}"
          config_base="config-${{ inputs.kernel_version }}-${{ inputs.manager }}${variant_suffix}"

          {
            echo "date=${DATE}"
            echo "variant_suffix=${variant_suffix}"
            echo "final_name=${final_name}"
            echo "config_base=${config_base}"
          } >> "$GITHUB_OUTPUT"

      - name: Install host tools
        uses: ./.github/actions/install-host-tools
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install repo
        uses: ./.github/actions/install-repo

      - name: Sync source
        uses: ./.github/actions/sync-kernel

      - name: Select Clang
        uses: ./.github/actions/select-clang
        with:
          clang_version: ${{ inputs.clang_version }}

      - name: Replace kernel/common source
        uses: ./.github/actions/replace-common-source
        with:
          source_repo: ${{ inputs.source_repo }}
          source_ref: ${{ inputs.source_ref }}

      - name: Init manager
        if: inputs.manager != 'Vanilla'
        uses: ./.github/actions/init-manager
        with:
          manager: ${{ inputs.manager }}
          manager_ref: ${{ inputs.manager_ref }}
          susfs: ${{ inputs.susfs }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply SUSFS4KSU patches
        if: inputs.susfs == 'on'
        uses: ./.github/actions/apply-susfs
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}

      - name: Apply Baseband Guard
        if: inputs.baseband_guard == 'on'
        uses: ./.github/actions/apply-baseband-guard
        with:
          baseband_guard: ${{ inputs.baseband_guard }}

      - name: Create private config fragment
        uses: ./.github/actions/create-config-fragment
        with:
          ikconfig: ${{ env.IKCONFIG }}
          container_core: ${{ env.CONTAINER_CORE }}
          container_ipc: ${{ env.CONTAINER_IPC }}
          mount_filesystems: ${{ env.MOUNT_FILESYSTEMS }}
          container_networking: ${{ env.CONTAINER_NETWORKING }}
          fq_codel_features: ${{ env.FQ_CODEL_FEATURES }}
          performance_features: ${{ env.PERFORMANCE_FEATURES }}
          debug_features: ${{ env.DEBUG_FEATURES }}
          heavy_debug_features: ${{ env.HEAVY_DEBUG_FEATURES }}
          susfs: ${{ inputs.susfs }}
          baseband_guard: ${{ inputs.baseband_guard }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply IPC KABI patches
        if: env.CONTAINER_IPC == 'on'
        uses: ./.github/actions/apply-ipc-kabi-patches
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install legacy CoreShift build config
        if: inputs.kernel_version == '5.10'
        uses: ./.github/actions/install-legacy-private-fragment
        with:
          strict_config: ${{ env.STRICT_CONFIG }}

      - name: Disable legacy 5.10 defconfig normalization check
        if: inputs.kernel_version == '5.10'
        uses: ./.github/actions/disable-legacy-defconfig-check

      - name: Disable legacy 5.10 strict KMI check for private build
        if: inputs.kernel_version == '5.10' && env.LEGACY_KMI_CHECK == 'off'
        uses: ./.github/actions/disable-legacy-kmi-check

      - name: Add swap for full LTO
        if: inputs.lto == 'full'
        uses: ./.github/actions/add-swap
        with:
          size_gb: "12"

      - name: Add swap for thin LTO
        if: inputs.lto == 'thin'
        uses: ./.github/actions/add-swap
        with:
          size_gb: "6"

      - name: Commit kernel changes
        uses: ./.github/actions/commit-kernel-changes

      - name: Build kernel
        uses: ./.github/actions/build-kernel
        with:
          lto: ${{ inputs.lto }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Write compiler metadata
        uses: ./.github/actions/write-compiler-metadata
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Verify final config
        uses: ./.github/actions/verify-final-config
        with:
          strict_config: ${{ env.STRICT_CONFIG }}

      - name: Export final config
        uses: ./.github/actions/export-final-config
        env:
          CONFIG_NAME_SUFFIX: ${{ steps.build-name.outputs.variant_suffix }}
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}
          susfs: ${{ inputs.susfs }}

      - name: Package
        uses: ./.github/actions/package-kernel
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}
          susfs: ${{ inputs.susfs }}
          final_name: ${{ steps.build-name.outputs.final_name }}

      - name: Stage artifact outputs
        if: env.PUBLISH_MODE == 'artifact'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifact-root image-artifact
          cp -a ak3_work/. artifact-root/
          cp compiler-version.txt artifact-root/
          cp "out/Image-${FINAL_NAME}" image-artifact/
          cp compiler-version.txt image-artifact/

      - name: Upload flashable artifact tree
        if: env.PUBLISH_MODE == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: flashable-${{ inputs.kernel_version }}-${{ inputs.manager }}${{ steps.build-name.outputs.variant_suffix }}-${{ steps.build-name.outputs.date }}
          path: artifact-root/**
          if-no-files-found: error

      - name: Upload raw Image artifact
        if: env.PUBLISH_MODE == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ inputs.kernel_version }}-${{ inputs.manager }}${{ steps.build-name.outputs.variant_suffix }}-${{ steps.build-name.outputs.date }}
          path: |
            image-artifact/Image-*
            image-artifact/compiler-version.txt
          if-no-files-found: error

      - name: Upload config artifact
        if: env.PUBLISH_MODE == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ inputs.kernel_version }}-${{ inputs.manager }}${{ steps.build-name.outputs.variant_suffix }}-${{ steps.build-name.outputs.date }}
          path: |
            compiler-version.txt
            out/${{ steps.build-name.outputs.config_base }}.txt
            out/${{ steps.build-name.outputs.config_base }}.gz
          if-no-files-found: error

      - name: Stage release zip
        if: env.PUBLISH_MODE == 'release'
        shell: bash
        run: |
          set -euo pipefail

          release_dir="$PWD/release-staging"
          zip_path="${{ steps.build-name.outputs.final_name }}.zip"

          mkdir -p "$release_dir"

          if [ ! -f "$zip_path" ]; then
            echo "::error::Release requested but no flashable zip was found at $zip_path"
            exit 1
          fi

          cp "$zip_path" "$release_dir/"

      - name: Write release body
        if: env.PUBLISH_MODE == 'release'
        shell: bash
        run: |
          set -euo pipefail

          susfs_label="Disabled"
          if [ "${{ inputs.susfs }}" = "on" ]; then
            susfs_label="Enabled"
          fi

          bbg_label="Disabled"
          if [ "${{ inputs.baseband_guard }}" = "on" ]; then
            bbg_label="Enabled"
          fi

          cat > release-body.md <<EOF
          CoreShift GKI

          - Kernel: ${{ inputs.kernel_version }}
          - Manager: ${{ inputs.manager }}
          - LTO: ${{ inputs.lto }}
          - SUSFS: ${susfs_label}
          - BBG: ${bbg_label}
          - Date: ${DATE}

          Extra files are available in workflow artifacts.
          EOF

      - name: Create release
        if: env.PUBLISH_MODE == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build-name.outputs.final_name }}
          name: ${{ steps.build-name.outputs.final_name }}
          files: release-staging/*.zip
          body_path: release-body.md
