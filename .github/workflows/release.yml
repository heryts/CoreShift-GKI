name: Build Kernel Release Matrix

on:
  workflow_dispatch:

jobs:
  prepare-matrix:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build variant matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          matrix="$(
            python3 - <<'PY'
          import json
          from pathlib import Path

          required = {
              "kernel_version",
              "manager",
              "susfs",
              "lto",
              "ikconfig",
              "container_core",
              "container_ipc",
              "mount_filesystems",
              "container_networking",
              "fq_codel_features",
              "performance_features",
              "debug_features",
              "heavy_debug_features",
              "baseband_guard",
              "strict_config",
              "legacy_kmi_check",
          }

          matrix = json.loads(Path(".github/matrix/release.json").read_text())
          include = matrix.get("include")

          if not isinstance(include, list) or not include:
              raise SystemExit("release matrix must contain a non-empty include list")

          for index, variant in enumerate(include):
              if not isinstance(variant, dict):
                  raise SystemExit(f"variant {index} must be an object")

              missing = sorted(required - set(variant))
              extra = sorted(set(variant) - required)

              if missing:
                  raise SystemExit(f"variant {index} missing fields: {', '.join(missing)}")
              if extra:
                  raise SystemExit(f"variant {index} has unknown fields: {', '.join(extra)}")

          print(json.dumps(matrix, separators=(",", ":"), sort_keys=True))
          PY
          )"

          echo "== matrix JSON =="
          printf '%s\n' "$matrix"

          {
            echo "matrix<<EOF"
            printf '%s\n' "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.kernel_version }} / ${{ matrix.manager }} / SUSFS ${{ matrix.susfs }}
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set variables
        uses: ./.github/actions/setup-vars
        with:
          kernel_version: ${{ matrix.kernel_version }}

      - name: Install host tools
        uses: ./.github/actions/install-host-tools
        with:
          kernel_version: ${{ matrix.kernel_version }}

      - name: Install repo
        uses: ./.github/actions/install-repo

      - name: Sync source
        uses: ./.github/actions/sync-kernel

      - name: Init manager
        if: matrix.manager != 'Vanilla'
        uses: ./.github/actions/init-manager
        with:
          manager: ${{ matrix.manager }}
          manager_ref: ""
          susfs: ${{ matrix.susfs }}
          kernel_version: ${{ matrix.kernel_version }}

      - name: Apply SUSFS4KSU patches
        if: matrix.susfs == 'on'
        uses: ./.github/actions/apply-susfs
        with:
          kernel_version: ${{ matrix.kernel_version }}
          manager: ${{ matrix.manager }}

      - name: Create private config fragment
        uses: ./.github/actions/create-config-fragment
        with:
          ikconfig: ${{ matrix.ikconfig }}
          container_core: ${{ matrix.container_core }}
          container_ipc: ${{ matrix.container_ipc }}
          mount_filesystems: ${{ matrix.mount_filesystems }}
          container_networking: ${{ matrix.container_networking }}
          fq_codel_features: ${{ matrix.fq_codel_features }}
          performance_features: ${{ matrix.performance_features }}
          debug_features: ${{ matrix.debug_features }}
          heavy_debug_features: ${{ matrix.heavy_debug_features }}
          susfs: ${{ matrix.susfs }}
          baseband_guard: ${{ matrix.baseband_guard }}
          kernel_version: ${{ matrix.kernel_version }}

      - name: Apply IPC KABI patches
        if: matrix.container_ipc == 'on'
        uses: ./.github/actions/apply-ipc-kabi-patches
        with:
          kernel_version: ${{ matrix.kernel_version }}

      - name: Generate legacy CoreShift defconfig
        if: matrix.kernel_version == '5.10'
        uses: ./.github/actions/install-legacy-private-fragment
        with:
          strict_config: ${{ matrix.strict_config }}

      - name: Disable legacy 5.10 defconfig normalization check
        if: matrix.kernel_version == '5.10'
        uses: ./.github/actions/disable-legacy-defconfig-check

      - name: Disable legacy 5.10 strict KMI check for private build
        if: matrix.kernel_version == '5.10' && matrix.legacy_kmi_check == 'off'
        uses: ./.github/actions/disable-legacy-kmi-check

      - name: Add swap for full LTO
        if: matrix.lto == 'full'
        uses: ./.github/actions/add-swap

      - name: Guard legacy gki_defconfig
        if: matrix.kernel_version == '5.10'
        shell: bash
        run: |
          set -euo pipefail

          cd kernel

          if ! git -C common diff --exit-code -- arch/arm64/configs/gki_defconfig; then
            echo "::error::common/arch/arm64/configs/gki_defconfig changed; private.fragment must apply only to generated .config"
            exit 1
          fi

      - name: Commit kernel changes
        uses: ./.github/actions/commit-kernel-changes

      - name: Build kernel
        uses: ./.github/actions/build-kernel
        with:
          lto: ${{ matrix.lto }}
          kernel_version: ${{ matrix.kernel_version }}

      - name: Verify final config
        uses: ./.github/actions/verify-final-config
        with:
          strict_config: ${{ matrix.strict_config }}

      - name: Export final config
        uses: ./.github/actions/export-final-config
        with:
          kernel_version: ${{ matrix.kernel_version }}
          manager: ${{ matrix.manager }}
          susfs: ${{ matrix.susfs }}

      - name: Package
        uses: ./.github/actions/package-kernel
        with:
          kernel_version: ${{ matrix.kernel_version }}
          manager: ${{ matrix.manager }}
          susfs: ${{ matrix.susfs }}

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "kernel_version=${{ matrix.kernel_version }}"
            echo "manager=${{ matrix.manager }}"
            echo "susfs=${{ matrix.susfs }}"
            echo "lto=${{ matrix.lto }}"
            echo "ikconfig=${{ matrix.ikconfig }}"
            echo "container_core=${{ matrix.container_core }}"
            echo "container_ipc=${{ matrix.container_ipc }}"
            echo "mount_filesystems=${{ matrix.mount_filesystems }}"
            echo "container_networking=${{ matrix.container_networking }}"
            echo "fq_codel_features=${{ matrix.fq_codel_features }}"
            echo "performance_features=${{ matrix.performance_features }}"
            echo "debug_features=${{ matrix.debug_features }}"
            echo "heavy_debug_features=${{ matrix.heavy_debug_features }}"
            echo "baseband_guard=${{ matrix.baseband_guard }}"
            echo "strict_config=${{ matrix.strict_config }}"
            echo "legacy_kmi_check=${{ matrix.legacy_kmi_check }}"
            echo "name=${FINAL_NAME}"
          } > release-manifest.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.kernel_version }}-${{ matrix.manager }}-susfs-${{ matrix.susfs }}-${{ env.DATE }}
          path: |
            *.zip
            out/Image-*
            out/config-*
            release-manifest.txt
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail

          date="$(date +'%Y%m%d')"
          tag="coreshift-gki-${date}-${GITHUB_RUN_NUMBER}"
          release_dir="$PWD/release-files"
          body="$PWD/release-body.md"

          mkdir -p "$release_dir"

          find release-artifacts -type f \( -name '*.zip' -o -name 'Image-*' -o -name 'config-*' \) -print0 |
            while IFS= read -r -d '' file; do
              cp "$file" "$release_dir/$(basename "$file")"
            done

          if ! find "$release_dir" -type f -print -quit | grep -q .; then
            echo "::error::No build artifacts found for release."
            exit 1
          fi

          {
            echo "Coreshift GKI release matrix"
            echo
            declare -A labels=(
              [lto]="LTO"
              [ikconfig]="IKCONFIG"
              [container_core]="Container core"
              [container_ipc]="Container IPC"
              [mount_filesystems]="Mount filesystems"
              [container_networking]="Container networking"
              [fq_codel_features]="FQ/FQ_CODEL features"
              [performance_features]="Performance features"
              [debug_features]="Debug features"
              [heavy_debug_features]="Heavy debug features"
              [baseband_guard]="Baseband Guard"
              [strict_config]="Strict config verification"
              [legacy_kmi_check]="Legacy KMI check"
            )

            for key in \
              lto \
              ikconfig \
              container_core \
              container_ipc \
              mount_filesystems \
              container_networking \
              fq_codel_features \
              performance_features \
              debug_features \
              heavy_debug_features \
              baseband_guard \
              strict_config \
              legacy_kmi_check
            do
              values="$(
                while IFS= read -r manifest; do
                  sed -n "s/^${key}=//p" "$manifest"
                done < <(find release-artifacts -type f -name release-manifest.txt | sort) |
                sort -u
              )"

              if [ "$(printf '%s\n' "$values" | sed '/^$/d' | wc -l)" -eq 1 ]; then
                echo "- ${labels[$key]}: $values"
              else
                echo "- ${labels[$key]}: varies"
                while IFS= read -r manifest; do
                  kernel_version="$(sed -n 's/^kernel_version=//p' "$manifest")"
                  manager="$(sed -n 's/^manager=//p' "$manifest")"
                  susfs="$(sed -n 's/^susfs=//p' "$manifest")"
                  value="$(sed -n "s/^${key}=//p" "$manifest")"
                  printf '  - %s / %s / SUSFS %s: %s\n' "$kernel_version" "$manager" "$susfs" "$value"
                done < <(find release-artifacts -type f -name release-manifest.txt | sort)
              fi
            done

            echo "- Date: $date"
            echo

            for version in 5.10 6.1 6.6; do
              echo "## $version"

              version_lines="$(
                while IFS= read -r manifest; do
                  kernel_version="$(sed -n 's/^kernel_version=//p' "$manifest")"
                  manager="$(sed -n 's/^manager=//p' "$manifest")"
                  susfs="$(sed -n 's/^susfs=//p' "$manifest")"

                  if [ "$kernel_version" = "$version" ]; then
                    printf -- '- %s: SUSFS %s\n' "$manager" "$susfs"
                  fi
                done < <(find release-artifacts -type f -name release-manifest.txt | sort) |
                sort
              )"

              if [ -n "$version_lines" ]; then
                printf '%s\n' "$version_lines"
              else
                echo "- No artifacts produced"
              fi

              config_lines="$(
                find release-artifacts -type f \
                  \( -name "config-${version}-*.txt" -o -name "config-${version}-*.gz" \) \
                  -printf '%f\n' |
                sort
              )"

              if [ -n "$config_lines" ]; then
                echo
                echo "Config exports:"
                printf '%s\n' "$config_lines" | sed 's/^/- /'
              fi

              echo
            done
          } > "$body"

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_BODY=$body" >> "$GITHUB_ENV"

          echo "== release files =="
          find "$release_dir" -type f -printf '%f\n' | sort
          echo
          echo "== release body =="
          cat "$body"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: release-files/*
          body_path: ${{ env.RELEASE_BODY }}
