name: Custom Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]
      manager:
        type: choice
        required: true
        options: ["Vanilla", "KernelSU", "KernelSU-Next", "KowSU", "ResukiSU", "Rissu", "Wild_KSU"]
        default: "Vanilla"
      manager_ref:
        description: "Optional manager git ref/commit/tag"
        required: false
        default: ""
      lto:
        type: choice
        required: true
        options: ["thin", "full", "none"]
        default: "thin"
      ikconfig:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      container_core:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      container_ipc:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      mount_filesystems:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      container_networking:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      fq_codel_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      performance_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      debug_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      heavy_debug_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      susfs:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      baseband_guard:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      strict_config:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      legacy_kmi_check:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      publish_mode:
        type: choice
        required: true
        options: ["release", "artifact", "both"]
        default: "release"

jobs:
  build:
    name: ${{ inputs.kernel_version }} / ${{ inputs.manager }} / SUSFS ${{ inputs.susfs }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.manager }}" = "Vanilla" ] && [ "${{ inputs.susfs }}" = "on" ]; then
            echo "::error::SUSFS requires a KernelSU-compatible manager; manager=Vanilla cannot use susfs=on"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set variables
        uses: ./.github/actions/setup-vars
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Set custom output name
        id: custom-name
        shell: bash
        run: |
          set -euo pipefail

          final_name="custom-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}-${DATE}-${{ github.run_number }}"

          {
            echo "date=${DATE}"
            echo "final_name=${final_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Install host tools
        uses: ./.github/actions/install-host-tools
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install repo
        uses: ./.github/actions/install-repo

      - name: Sync source
        uses: ./.github/actions/sync-kernel

      - name: Init manager
        if: inputs.manager != 'Vanilla'
        uses: ./.github/actions/init-manager
        with:
          manager: ${{ inputs.manager }}
          manager_ref: ${{ inputs.manager_ref }}
          susfs: ${{ inputs.susfs }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply SUSFS4KSU patches
        if: inputs.susfs == 'on'
        uses: ./.github/actions/apply-susfs
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}

      - name: Apply Baseband Guard
        if: inputs.baseband_guard == 'on'
        uses: ./.github/actions/apply-baseband-guard
        with:
          baseband_guard: ${{ inputs.baseband_guard }}

      - name: Create private config fragment
        uses: ./.github/actions/create-config-fragment
        with:
          ikconfig: ${{ inputs.ikconfig }}
          container_core: ${{ inputs.container_core }}
          container_ipc: ${{ inputs.container_ipc }}
          mount_filesystems: ${{ inputs.mount_filesystems }}
          container_networking: ${{ inputs.container_networking }}
          fq_codel_features: ${{ inputs.fq_codel_features }}
          performance_features: ${{ inputs.performance_features }}
          debug_features: ${{ inputs.debug_features }}
          heavy_debug_features: ${{ inputs.heavy_debug_features }}
          susfs: ${{ inputs.susfs }}
          baseband_guard: ${{ inputs.baseband_guard }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply IPC KABI patches
        if: inputs.container_ipc == 'on'
        uses: ./.github/actions/apply-ipc-kabi-patches
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Generate legacy CoreShift defconfig
        if: inputs.kernel_version == '5.10'
        uses: ./.github/actions/install-legacy-private-fragment
        with:
          strict_config: ${{ inputs.strict_config }}

      - name: Disable legacy 5.10 defconfig normalization check
        if: inputs.kernel_version == '5.10'
        uses: ./.github/actions/disable-legacy-defconfig-check

      - name: Disable legacy 5.10 strict KMI check for private build
        if: inputs.kernel_version == '5.10' && inputs.legacy_kmi_check == 'off'
        uses: ./.github/actions/disable-legacy-kmi-check

      - name: Add swap for full LTO
        if: inputs.lto == 'full'
        uses: ./.github/actions/add-swap

      - name: Guard legacy gki_defconfig
        if: inputs.kernel_version == '5.10'
        shell: bash
        run: |
          set -euo pipefail

          cd kernel

          if ! git -C common diff --exit-code -- arch/arm64/configs/gki_defconfig; then
            echo "::error::common/arch/arm64/configs/gki_defconfig changed; private.fragment must apply only to generated .config"
            exit 1
          fi

      - name: Commit kernel changes
        uses: ./.github/actions/commit-kernel-changes

      - name: Build kernel
        uses: ./.github/actions/build-kernel
        with:
          lto: ${{ inputs.lto }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Verify final config
        uses: ./.github/actions/verify-final-config
        with:
          strict_config: ${{ inputs.strict_config }}

      - name: Export final config
        uses: ./.github/actions/export-final-config
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}
          susfs: ${{ inputs.susfs }}

      - name: Package
        uses: ./.github/actions/package-kernel
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}
          susfs: ${{ inputs.susfs }}
          final_name: ${{ steps.custom-name.outputs.final_name }}

      - name: Stage artifact outputs
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifact-root image-artifact
          cp -a ak3_work/. artifact-root/
          cp "out/Image-${FINAL_NAME}" image-artifact/

      - name: Upload flashable artifact tree
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: flashable-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}-${{ steps.custom-name.outputs.date }}
          path: artifact-root/**
          if-no-files-found: error

      - name: Upload raw Image artifact
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}-${{ steps.custom-name.outputs.date }}
          path: image-artifact/Image-*
          if-no-files-found: error

      - name: Upload config artifact
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}-${{ steps.custom-name.outputs.date }}
          path: out/config-*
          if-no-files-found: error

      - name: Write release body
        if: inputs.publish_mode == 'release' || inputs.publish_mode == 'both'
        shell: bash
        run: |
          set -euo pipefail

          cat > release-body.md <<EOF
          Custom CoreShift-GKI build

          - Kernel version: ${{ inputs.kernel_version }}
          - Manager: ${{ inputs.manager }}
          - Manager ref: ${{ inputs.manager_ref }}
          - SUSFS4KSU: ${{ inputs.susfs }}
          - LTO: ${{ inputs.lto }}
          - IKCONFIG: ${{ inputs.ikconfig }}
          - Container core: ${{ inputs.container_core }}
          - Container IPC: ${{ inputs.container_ipc }}
          - Mount filesystems: ${{ inputs.mount_filesystems }}
          - Container networking: ${{ inputs.container_networking }}
          - FQ/FQ_CODEL features: ${{ inputs.fq_codel_features }}
          - Performance features: ${{ inputs.performance_features }}
          - Debug features: ${{ inputs.debug_features }}
          - Heavy debug features: ${{ inputs.heavy_debug_features }}
          - Baseband Guard: ${{ inputs.baseband_guard }}
          - Strict config verification: ${{ inputs.strict_config }}
          - Legacy KMI check: ${{ inputs.legacy_kmi_check }}
          - Publish mode: ${{ inputs.publish_mode }}
          - Config exports: config-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}.txt, config-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}.gz
          - Date: ${DATE}
          - Engine: ${BUILD_ENGINE}
          EOF

      - name: Create release
        if: inputs.publish_mode == 'release' || inputs.publish_mode == 'both'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.custom-name.outputs.final_name }}
          name: ${{ steps.custom-name.outputs.final_name }}
          files: |
            ${{ steps.custom-name.outputs.final_name }}.zip
            out/Image-${{ steps.custom-name.outputs.final_name }}
            out/config-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}.txt
            out/config-${{ inputs.kernel_version }}-${{ inputs.manager }}-susfs-${{ inputs.susfs }}.gz
          body_path: release-body.md
