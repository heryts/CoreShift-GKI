name: Custom Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6", "6.12"]
      manager:
        type: choice
        required: true
        options: ["Vanilla", "KernelSU", "KernelSU-Next", "KowSU", "ResukiSU", "Rissu", "Wild_KSU"]
        default: "Vanilla"
      manager_ref:
        description: "Optional manager git ref/commit/tag"
        required: false
        default: ""
      source_mode:
        type: choice
        required: true
        options: ["google-lts", "maintained", "custom"]
        default: "google-lts"
      source_repo:
        description: "Custom kernel/common repo URL, used only when source_mode=custom"
        required: false
        default: ""
      source_ref:
        description: "Optional source git ref/branch/tag/commit"
        required: false
        default: ""
      lto:
        type: choice
        required: true
        options: ["thin", "full", "none"]
        default: "thin"
      ikconfig:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      container_features:
        description: "Enable container-related kernel options"
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      mount_filesystems:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      fq_codel_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      performance_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      debug_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      heavy_debug_features:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      susfs:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      baseband_guard:
        type: choice
        required: true
        options: ["on", "off"]
        default: "off"
      strict_config:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      legacy_kmi_check:
        type: choice
        required: true
        options: ["on", "off"]
        default: "on"
      publish_mode:
        type: choice
        required: true
        options: ["release", "artifact", "both"]
        default: "artifact"

jobs:
  build:
    name: ${{ inputs.kernel_version }} / ${{ inputs.manager }} / SUSFS ${{ inputs.susfs }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.manager }}" = "Vanilla" ] && [ "${{ inputs.susfs }}" = "on" ]; then
            echo "::error::SUSFS requires a KernelSU-compatible manager; manager=Vanilla cannot use susfs=on"
            exit 1
          fi

          if [ "${{ inputs.source_mode }}" = "custom" ] && [ -z "${{ inputs.source_repo }}" ]; then
            echo "::error::source_repo is required when source_mode=custom"
            exit 1
          fi

          if [ "${{ inputs.kernel_version }}" = "6.12" ] && [ "${{ inputs.susfs }}" = "on" ] && [ "${{ inputs.source_mode }}" = "google-lts" ]; then
            echo "::error::6.12 SUSFS is currently validated only on maintained/custom source paths. Select source_mode=maintained or source_mode=custom with a compatible source tree."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set variables
        uses: ./.github/actions/setup-vars
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Set custom output name
        id: custom-name
        shell: bash
        run: |
          set -euo pipefail

          susfs_label=""
          if [ "${{ inputs.susfs }}" = "on" ]; then
            susfs_label="-susfs"
          fi

          bbg_label=""
          if [ "${{ inputs.baseband_guard }}" = "on" ]; then
            bbg_label="-bbg"
          fi

          variant_suffix="${susfs_label}${bbg_label}"
          final_name="custom-${{ inputs.kernel_version }}-${{ inputs.manager }}${variant_suffix}-${DATE}-${{ github.run_number }}"
          config_base="config-${{ inputs.kernel_version }}-${{ inputs.manager }}${variant_suffix}"

          {
            echo "date=${DATE}"
            echo "variant_suffix=${variant_suffix}"
            echo "final_name=${final_name}"
            echo "config_base=${config_base}"
          } >> "$GITHUB_OUTPUT"

      - name: Install host tools
        uses: ./.github/actions/install-host-tools
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install repo
        uses: ./.github/actions/install-repo

      - name: Sync source
        uses: ./.github/actions/sync-kernel

      - name: Resolve source repo
        id: source-repo
        shell: bash
        run: |
          set -euo pipefail

          effective_source_repo=""
          effective_source_ref="${{ inputs.source_ref }}"

          case "${{ inputs.source_mode }}" in
            google-lts)
              effective_source_ref=""
              ;;
            maintained)
              case "${{ inputs.kernel_version }}" in
                5.10)
                  effective_source_repo="https://github.com/ramabondanp/android_kernel_common-5.10"
                  ;;
                6.1)
                  effective_source_repo="https://github.com/ramabondanp/android_kernel_common-6.1"
                  ;;
                6.6)
                  effective_source_repo="https://github.com/ramabondanp/android_kernel_common-6.6"
                  ;;
                6.12)
                  effective_source_repo="https://github.com/ramabondanp/android_kernel_common-6.12"
                  ;;
                *)
                  echo "::error::No maintained source repo for kernel_version=${{ inputs.kernel_version }}"
                  exit 1
                  ;;
              esac
              ;;
            custom)
              effective_source_repo="${{ inputs.source_repo }}"
              ;;
            *)
              echo "::error::unsupported source_mode=${{ inputs.source_mode }}"
              exit 1
              ;;
          esac

          {
            echo "source_repo=$effective_source_repo"
            echo "source_ref=$effective_source_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Replace kernel/common source
        if: inputs.source_mode != 'google-lts'
        uses: ./.github/actions/replace-common-source
        with:
          source_repo: ${{ steps.source-repo.outputs.source_repo }}
          source_ref: ${{ steps.source-repo.outputs.source_ref }}

      - name: Fix stale KernelSU Kconfig include
        if: inputs.kernel_version == '6.12'
        uses: ./.github/actions/fix-stale-kernelsu-kconfig

      - name: Ensure expected Clang
        if: inputs.source_mode != 'google-lts'
        uses: ./.github/actions/ensure-expected-clang
        with:
          enabled: "true"
          kernel_version: ${{ inputs.kernel_version }}

      - name: Init manager
        if: inputs.manager != 'Vanilla'
        uses: ./.github/actions/init-manager
        with:
          manager: ${{ inputs.manager }}
          manager_ref: ${{ inputs.manager_ref }}
          susfs: ${{ inputs.susfs }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply SUSFS4KSU patches
        if: inputs.susfs == 'on'
        uses: ./.github/actions/apply-susfs
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}

      - name: Apply Baseband Guard
        if: inputs.baseband_guard == 'on'
        uses: ./.github/actions/apply-baseband-guard
        with:
          baseband_guard: ${{ inputs.baseband_guard }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Create private config fragment
        uses: ./.github/actions/create-config-fragment
        with:
          ikconfig: ${{ inputs.ikconfig }}
          container_core: ${{ inputs.container_features }}
          container_ipc: ${{ inputs.container_features }}
          mount_filesystems: ${{ inputs.mount_filesystems }}
          container_networking: ${{ inputs.container_features }}
          fq_codel_features: ${{ inputs.fq_codel_features }}
          performance_features: ${{ inputs.performance_features }}
          debug_features: ${{ inputs.debug_features }}
          heavy_debug_features: ${{ inputs.heavy_debug_features }}
          susfs: ${{ inputs.susfs }}
          baseband_guard: ${{ inputs.baseband_guard }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply IPC KABI patches
        if: inputs.container_features == 'on'
        uses: ./.github/actions/apply-ipc-kabi-patches
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Install legacy CoreShift build config
        if: inputs.kernel_version == '5.10'
        uses: ./.github/actions/install-legacy-private-fragment
        with:
          strict_config: ${{ inputs.strict_config }}

      - name: Disable legacy 5.10 defconfig normalization check
        if: inputs.kernel_version == '5.10'
        uses: ./.github/actions/disable-legacy-defconfig-check

      - name: Disable legacy 5.10 strict KMI check for private build
        if: inputs.kernel_version == '5.10' && inputs.legacy_kmi_check == 'off'
        uses: ./.github/actions/disable-legacy-kmi-check

      - name: Add swap for full LTO
        if: inputs.lto == 'full'
        uses: ./.github/actions/add-swap
        with:
          size_gb: "16"

      - name: Add swap for thin LTO
        if: inputs.lto == 'thin'
        uses: ./.github/actions/add-swap
        with:
          size_gb: "8"

      - name: Commit kernel changes
        uses: ./.github/actions/commit-kernel-changes

      - name: Build kernel
        uses: ./.github/actions/build-kernel
        with:
          lto: ${{ inputs.lto }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Write compiler metadata
        uses: ./.github/actions/write-compiler-metadata
        with:
          kernel_version: ${{ inputs.kernel_version }}

      - name: Verify final config
        uses: ./.github/actions/verify-final-config
        with:
          strict_config: ${{ inputs.strict_config }}

      - name: Export final config
        uses: ./.github/actions/export-final-config
        env:
          CONFIG_NAME_SUFFIX: ${{ steps.custom-name.outputs.variant_suffix }}
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}
          susfs: ${{ inputs.susfs }}

      - name: Package
        uses: ./.github/actions/package-kernel
        with:
          kernel_version: ${{ inputs.kernel_version }}
          manager: ${{ inputs.manager }}
          susfs: ${{ inputs.susfs }}
          final_name: ${{ steps.custom-name.outputs.final_name }}

      - name: Stage artifact outputs
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifact-root image-artifact
          cp -a ak3_work/. artifact-root/
          cp compiler-version.txt artifact-root/
          cp "out/Image-${FINAL_NAME}" image-artifact/
          cp compiler-version.txt image-artifact/

      - name: Upload flashable artifact tree
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: flashable-${{ inputs.kernel_version }}-${{ inputs.manager }}${{ steps.custom-name.outputs.variant_suffix }}-${{ steps.custom-name.outputs.date }}
          path: artifact-root/**
          if-no-files-found: error

      - name: Upload raw Image artifact
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ inputs.kernel_version }}-${{ inputs.manager }}${{ steps.custom-name.outputs.variant_suffix }}-${{ steps.custom-name.outputs.date }}
          path: |
            image-artifact/Image-*
            image-artifact/compiler-version.txt
          if-no-files-found: error

      - name: Upload config artifact
        if: inputs.publish_mode == 'artifact' || inputs.publish_mode == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ inputs.kernel_version }}-${{ inputs.manager }}${{ steps.custom-name.outputs.variant_suffix }}-${{ steps.custom-name.outputs.date }}
          path: |
            compiler-version.txt
            out/${{ steps.custom-name.outputs.config_base }}.txt
            out/${{ steps.custom-name.outputs.config_base }}.gz
          if-no-files-found: error

      - name: Stage release zip
        if: inputs.publish_mode == 'release' || inputs.publish_mode == 'both'
        shell: bash
        run: |
          set -euo pipefail

          release_dir="$PWD/release-staging"
          zip_path="${{ steps.custom-name.outputs.final_name }}.zip"

          mkdir -p "$release_dir"

          if [ ! -f "$zip_path" ]; then
            echo "::error::Release requested but no flashable zip was found at $zip_path"
            exit 1
          fi

          cp "$zip_path" "$release_dir/"
          cp compiler-version.txt "$release_dir/"

      - name: Write release body
        if: inputs.publish_mode == 'release' || inputs.publish_mode == 'both'
        shell: bash
        run: |
          set -euo pipefail

          susfs_label="Disabled"
          if [ "${{ inputs.susfs }}" = "on" ]; then
            susfs_label="Enabled"
          fi

          bbg_label="Disabled"
          if [ "${{ inputs.baseband_guard }}" = "on" ]; then
            bbg_label="Enabled"
          fi

          cat > release-body.md <<EOF
          CoreShift GKI

          - Kernel: ${{ inputs.kernel_version }}
          - Manager: ${{ inputs.manager }}
          - LTO: ${{ inputs.lto }}
          - SUSFS: ${susfs_label}
          - BBG: ${bbg_label}
          - Date: ${DATE}
          - Compiler metadata: compiler-version.txt

          Extra files are available in workflow artifacts.
          After boot, compare with uname -a or cat /proc/version.
          EOF

      - name: Create release
        if: inputs.publish_mode == 'release' || inputs.publish_mode == 'both'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.custom-name.outputs.final_name }}
          name: ${{ steps.custom-name.outputs.final_name }}
          files: release-staging/*.zip
          body_path: release-body.md
